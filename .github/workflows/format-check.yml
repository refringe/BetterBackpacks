name: Format Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  csharpier:
    name: CSharpier
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Restore tools
        run: |
          dotnet tool restore --tool-manifest Client/dotnet-tools.json
          dotnet tool restore --tool-manifest Server/dotnet-tools.json

      - name: Check Client formatting
        run: dotnet csharpier --check Client/

      - name: Check Server formatting
        run: dotnet csharpier --check Server/
